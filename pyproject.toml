[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["."]
# Only unit tests are auto-discovered. Integration tests (test_*_integration.py)
# must be passed as explicit file paths — see CONTRIBUTING.md for details.
python_files = ["test_*_unit.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "unit: Pure unit tests — mocked, no credentials needed, safe for CI",
    "integration: Integration tests — require real API credentials, never run in CI",
]
# --import-mode=importlib: avoids __init__.py package resolution issues
# -m unit: only run CI-safe mocked tests by default
# To run integration tests: pytest <path>/test_*_integration.py -m integration
addopts = "--import-mode=importlib -m unit --tb=short"

norecursedirs = ["dependencies", "__pycache__", ".git", ".ruff_cache"]

# Environment variables for integration tests are loaded from .env
# by the root conftest.py (stdlib-only, no plugin dependency).

[tool.coverage.run]
omit = ["*/tests/*", "conftest.py"]

[tool.coverage.report]
show_missing = true
skip_empty = true
